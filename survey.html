<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PUMDT 초진설문지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --bg:#FAF8F4;
  --brand:#DDAB63;
  --brand-light:#FBF5E8;
  --brand-dark:#455546;
  --text:#455546;
  --muted:#455546;
  --border:#C5D5DA;
  --header:#2d3830;
  --green:#93AA6D;
  --green-light:#E8EFD9;
  --coral:#D1745D;
  --coral-light:#FAE9E4;
  --beige:#E5DECF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Montserrat','Pretendard',sans-serif;color:var(--text)}
.app{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

.topbar{background:var(--header);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{color:#fff;font-size:18px;font-weight:600}
.topbar-sub{color:rgba(255,255,255,0.6);font-size:13px;margin-top:6px}
.step-pills{display:flex;gap:5px}
.sp{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.3s}
.sp.active{width:26px;border-radius:5px;background:var(--green)}
.sp.done{background:rgba(147,170,109,0.5)}

.progress-bar{height:4px;background:var(--border)}
.progress-fill{height:4px;background:var(--brand);transition:width 0.4s ease}

.content{flex:1;padding:36px 24px;padding-bottom:140px}

.step-header{margin-bottom:32px}
.step-badge{display:inline-block;background:var(--brand-light);color:var(--brand-dark);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:8px}
.step-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.step-title{font-size:25px;font-weight:700;color:var(--text);line-height:1.3}
.step-desc{font-size:15px;font-weight:400;color:var(--muted);line-height:1.6;white-space:nowrap;flex-shrink:0}

.card{background:#fff;border-radius:20px;border:none;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:28px 32px;margin-bottom:28px}
.notice-card{background:rgba(147,170,109,0.08);border-radius:20px;border:none;box-shadow:none;padding:32px 40px;margin-bottom:28px;max-width:100%}
.notice-card p{margin:0 0 8px;font-size:18px;color:#455546;line-height:1.5;letter-spacing:-0.03em}
.notice-card p:last-child{margin-bottom:0}
.notice-card strong{color:var(--brand-dark);font-weight:700}
.card-label{font-size:18px;font-weight:400;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.card-label-num{width:26px;height:26px;border-radius:50%;background:#455546;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-label-text{font-size:18px;font-weight:400;color:var(--muted)}

/* TAG BUTTONS */
.tag-wrap{display:flex;flex-wrap:wrap;gap:12px}
.tag-btn{border:1px solid #93AA6D;border-radius:30px;padding:14px 24px;background:rgba(255,255,255,0.70);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;font-family:'Montserrat','Pretendard',sans-serif;transition:all 0.12s;user-select:none}
.tag-btn.sel{border:2px solid #455546;background:rgba(147,170,109,0.15);color:#455546;font-weight:500}
#ref-cat .tag-btn.sel{background:rgba(147,170,109,0.8);border-color:#93AA6D;color:#fff}

/* RADIO BUTTONS */
.radio-wrap{display:flex;flex-direction:column;gap:20px}
#r-duration .sel-content,#pi-eff .sel-content,#sh-life .sel-content{flex-direction:row;align-items:center;justify-content:space-between}
#ins-docs .sel-content,#med-check .sel-content{flex-direction:row;align-items:center;justify-content:space-between;width:100%}
#ins-carrier{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
#ins-carrier .sel-item{display:flex !important;flex-direction:column !important;align-items:stretch !important;cursor:pointer}
#ins-carrier .sel-item > div:first-child{display:flex;align-items:center;gap:12px}
#ins-carrier .sel-content{flex:1}
#r-duration .sel-desc,#pi-eff .sel-desc,#sh-life .sel-desc{margin-top:0;text-align:right;flex-shrink:0}
#ins-docs .sel-desc,#med-check .sel-desc{margin-top:0;font-size:15px;color:#455546;font-weight:400}
.radio-item{border:1px solid #93AA6D;border-radius:14px;padding:20px 24px;background:rgba(255,255,255,0.70);font-size:18px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.12s;user-select:none}
.radio-item.sel{border:2px solid #455546;background:rgba(147,170,109,0.15);color:#455546;font-weight:500}
.radio-circle{width:20px;height:20px;border-radius:50%;border:1px solid #93AA6D;flex-shrink:0;transition:all 0.12s}
.radio-item.sel .radio-circle{border-color:#93AA6D;background:#93AA6D;box-shadow:inset 0 0 0 4px #fff}
.radio-sub{font-size:14px;font-weight:400;color:var(--muted);margin-top:4px}

/* GRID BUTTONS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-btn{border:1px solid #93AA6D;border-radius:14px;padding:22px;background:rgba(255,255,255,0.70);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;font-family:'Montserrat','Pretendard',sans-serif;transition:all 0.12s;user-select:none}
.grid-btn.sel{border:2px solid #455546;background:rgba(147,170,109,0.15);color:#455546}

/* NRS */
.nrs-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.nrs-btn{border-radius:10px;border:2px solid var(--border);padding:12px 4px;background:#fff;cursor:pointer;text-align:center;font-size:20px;font-weight:700;transition:all 0.12s;font-family:'Inter','Pretendard',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text)}
.nrs-sub{font-size:15px;font-weight:400;color:var(--muted)}
.nrs-btn.nrs-1{background:var(--green-light);border-color:var(--green)}
.nrs-btn.nrs-2{background:var(--brand-light);border-color:var(--brand)}
.nrs-btn.nrs-3{background:#FBF5E8;border-color:#C49340}
.nrs-btn.nrs-4{background:var(--coral-light);border-color:var(--coral)}
.nrs-btn.nrs-5{background:var(--coral-light);border-color:#A54038}
.nrs-btn.sel{border-width:3px;transform:scale(1.05)}

/* CAT BUTTONS */
.cat-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-btn{border:1px solid #93AA6D;border-radius:16px;padding:20px 12px;background:rgba(255,255,255,0.70);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all 0.15s;user-select:none}
.cat-btn.sel{border:2px solid #455546;background:rgba(147,170,109,0.15)}
.cat-icon{font-size:38px;line-height:1}
.cat-name{font-size:16px;font-weight:700;color:var(--text)}
.cat-sub{font-size:12px;color:var(--muted);line-height:1.4}
.cat-btn.sel .cat-name{color:#455546}

/* SUB AREA */
.sub-area{margin-top:12px;background:var(--beige);border-radius:10px;padding:12px;border:1px solid var(--border)}
.sub-area-title{font-size:12px;font-weight:700;color:var(--brand-dark);margin-bottom:8px}

/* FATIGUE */
.fatigue-card{background:#fff;border:none;border-radius:16px;padding:36px 32px;margin-bottom:44px}
.fatigue-title{font-size:18px;font-weight:400;color:var(--text);margin-bottom:24px;display:flex;align-items:center;gap:10px}
.fatigue-sub{font-size:13px;color:var(--muted);margin-top:4px;margin-bottom:20px}
.fatigue-scale{display:grid;grid-template-columns:repeat(6,1fr);gap:20px}
.fatigue-btn{border-radius:8px;border:2px solid var(--border);padding:24px 2px;background:#fff;cursor:pointer;font-size:16px;font-weight:700;font-family:'Inter','Pretendard',sans-serif;transition:all 0.12s;color:var(--muted)}
.fatigue-btn.f0,.fatigue-btn.f1{border-color:var(--green)}
.fatigue-btn.f2,.fatigue-btn.f3{border-color:var(--brand)}
.fatigue-btn.f4,.fatigue-btn.f5{border-color:var(--coral)}
.fatigue-btn.sel{border-width:3px;transform:scale(1.07)}
.fatigue-btn.f0.sel,.fatigue-btn.f1.sel{background:rgba(147,170,109,0.15)}
.fatigue-btn.f2.sel,.fatigue-btn.f3.sel{background:rgba(221,171,99,0.15)}
.fatigue-btn.f4.sel,.fatigue-btn.f5.sel{background:rgba(209,116,93,0.15)}
.fatigue-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px}
.fatigue-result{margin-top:8px;text-align:center;font-size:12px;font-weight:500}

/* SUMMARY */
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--bg);font-size:13px;gap:12px}
.sum-row:last-child{border-bottom:none}
.sum-key{color:var(--muted);flex-shrink:0;min-width:80px}
.sum-val{color:var(--text);font-weight:500;text-align:right}

/* INPUT */
.text-input{width:100%;border:1px solid #93AA6D;border-radius:12px;padding:24px 20px;font-size:18px;font-family:'Montserrat','Pretendard',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:#455546}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--header);border-top:none;padding:20px 24px 28px;display:grid;grid-template-columns:1fr 2fr;gap:12px;max-width:900px;margin:0 auto}
.bottom-nav.first-step{grid-template-columns:1fr}
.btn-prev{width:100%;min-height:56px;padding:16px 20px;border:1px solid rgba(255,255,255,0.6);border-radius:16px;background:transparent;font-size:15px;font-weight:500;color:#fff;cursor:pointer;font-family:'Montserrat','Pretendard',sans-serif}
.btn-prev:active{background:var(--green);border-color:var(--green);color:#fff}
.btn-next{width:100%;min-height:56px;padding:16px 20px;border:1px solid #93AA6D;border-radius:16px;background:#fff;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Montserrat','Pretendard',sans-serif}
.btn-next:active{background:var(--green);border-color:var(--green);color:#fff}

.alert-box{background:var(--coral-light);border:1px solid var(--coral);border-radius:10px;padding:12px 14px;margin-top:10px;font-size:13px;color:#455546;line-height:1.6}
.section-sub{font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 6px}

/* PROVOKE ITEMS */
.provoke-item{border:1px solid #93AA6D;border-radius:12px;padding:13px 16px;background:rgba(255,255,255,0.70);cursor:pointer;display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;transition:all 0.12s;user-select:none}
.provoke-item.sel{border:2px solid #455546;background:rgba(147,170,109,0.15)}
.p-check{width:20px;height:20px;border-radius:5px;border:1px solid #93AA6D;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;transition:all 0.12s}
.provoke-item.sel .p-check{background:#93AA6D;border-color:#93AA6D}
.p-badge{font-size:10px;font-weight:400;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.badge-move{background:#D8E8EC;color:#455546}
.badge-rest{background:var(--brand-light);color:var(--brand-dark)}
.badge-auto{background:var(--coral-light);color:#455546}
.p-desc{font-size:14px;font-weight:400;color:var(--muted);margin-top:3px;line-height:1.5}

/* UNIFIED SELECTION ITEMS */
.sel-wrap{display:flex;flex-direction:column;gap:20px}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.sel-item{border:1px solid #93AA6D;border-radius:12px;padding:24px 20px;background:rgba(255,255,255,0.70);cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:all 0.12s;user-select:none}
.sel-item.sel{border:2px solid #455546;background:rgba(147,170,109,0.15)}
.sel-box{width:24px;height:24px;border-radius:6px;border:1px solid #93AA6D;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;background:#fff;transition:all 0.12s}
.sel-item.sel .sel-box{background:#93AA6D;border-color:#93AA6D}
.sel-name{font-size:18px;font-weight:600;color:var(--text);flex:1;line-height:1.35}
.sel-item.sel .sel-name{color:#455546}
.sel-desc{font-size:15px;color:#455546;text-align:left;white-space:normal;margin-top:4px;font-weight:400}
.sel-content{display:flex;flex-direction:column;flex:1;gap:4px}
/* grid item overrides */
.sel-grid .sel-item{padding:24px 20px;border:1px solid #93AA6D;font-size:16px;font-weight:400;align-items:flex-start}
.sel-grid .sel-item .sel-name{font-size:18px;font-weight:600}
.sel-grid .sel-item.sel{border:2px solid #455546;background:rgba(147,170,109,0.15)}
.sel-grid .sel-item.sel .sel-name{color:#455546}
.sel-grid .sel-item.sel .sel-box{background:#93AA6D;border-color:#93AA6D}

/* BODY SELECTOR */
.svg-wrap{width:100%;overflow-x:auto}
.svg-wrap svg{width:100%;height:auto;display:block}
.cls-5{fill:none;stroke:#231815;stroke-miterlimit:10;stroke-width:.25px}
.cls-6{fill:#efefef}
.hotspot{cursor:pointer}
.hs{fill:#93AA6D;opacity:0;transition:opacity 0.15s}
.hs.on{opacity:0.38}
.hr{fill:none;stroke:#93AA6D;stroke-width:2;opacity:0;transition:opacity 0.15s}
.hr.on{opacity:1}
/* PART GRID */
.pb-section{background:#ffffff;border-radius:16px;padding:36px 32px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:28px}
.pb-section-title{font-size:18px;font-weight:400;color:#455546;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.pb-section-title-num{width:26px;height:26px;border-radius:50%;background:#455546;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb-section-title-text{font-size:18px;font-weight:400;color:#455546}
.pb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
@media(max-width:520px){.pb-grid{grid-template-columns:repeat(2,1fr)}}
.pb-cell{display:flex;flex-direction:column;gap:6px}
.pb-item{width:100%;background:#ffffff;border:1px solid #93AA6D;border-radius:14px;padding:24px 20px;font-size:18px;font-weight:600;color:#455546;font-family:'Pretendard',sans-serif;transition:all 0.12s;user-select:none;display:flex;flex-direction:column;gap:0}
.pb-item.on{background:rgba(147,170,109,0.15);border:2px solid #455546;color:#455546}
.pb-check{width:20px;height:20px;border-radius:5px;border:1px solid #93AA6D;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:#fff;transition:all 0.12s}
.pb-item.on .pb-check{background:#93AA6D;border-color:#93AA6D}
.pb-toggles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;overflow:hidden;max-height:0;margin-top:0;transition:max-height 0.25s ease,margin-top 0.25s ease}
.pb-toggles.vis{max-height:300px;margin-top:8px}
.slide-wrap{overflow:hidden;max-height:0;margin-top:0;transition:max-height 0.35s ease,margin-top 0.35s ease}
.slide-wrap.vis{max-height:600px;margin-top:20px}
.pb-btn{background:#fff;border:1px solid #93AA6D;border-radius:6px;padding:10px;font-size:16px;font-weight:400;color:var(--brand-dark);cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.12s;user-select:none;text-align:center}
.pb-btn.on{background:var(--brand-dark);border-color:var(--brand-dark);color:#fff;font-weight:600}
.body-sel-box{background:#f5f5f0;border-radius:12px;padding:.9rem 1.1rem;min-height:52px;margin-top:1rem}
.sel-title{font-size:12px;color:#888;margin-bottom:7px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:rgba(147,170,109,0.1);border:1px solid #93AA6D;border-radius:20px;padding:3px 10px;font-size:12px;color:#455546;display:flex;align-items:center;gap:4px;cursor:pointer}
.tag-x{font-size:11px;color:#93AA6D;font-weight:bold}
.empty-t{font-size:13px;color:#aaa;font-style:italic}
.reset-b{margin-top:9px;font-size:12px;color:#aaa;cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
/* SCROLL INDICATOR */
@keyframes si-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
#scroll-indicator{position:fixed;right:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:100;opacity:0;transition:opacity 0.3s}
#scroll-indicator.visible{opacity:1}
#scroll-track{width:8px;height:140px;background:rgba(69,85,70,0.12);border-radius:6px;position:relative;overflow:hidden}
#scroll-thumb{width:8px;background:#93AA6D;border-radius:6px;position:absolute;top:0;min-height:28px;transition:top 0.1s,height 0.1s}
.scroll-arrows{display:flex;flex-direction:column;align-items:center;gap:1px}
.si-arrow{color:#93AA6D;font-size:14px;line-height:1;animation:si-bounce 1.2s ease-in-out infinite}
.si-arrow:nth-child(2){animation-delay:0.2s}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">PUMDT 메디컬 클리닉</div>
      <div class="topbar-sub">통증 초진설문지</div>
    </div>
    <div class="step-pills" id="pills"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="content" id="content"></div>
  <div class="bottom-nav" id="bottom-nav">
    <button class="btn-prev" id="btn-prev">← 이전</button>
    <button class="btn-next" id="btn-next">다음 →</button>
  </div>
</div>
<div id="scroll-indicator">
  <div id="scroll-track">
    <div id="scroll-thumb"></div>
  </div>
  <div class="scroll-arrows">
    <div class="si-arrow">▾</div>
    <div class="si-arrow" style="opacity:0.5">▾</div>
  </div>
</div>

<script>
const STEPS = 12;
let step = 0;
const D = {medCheck: new Set()};

// ── 유틸 ──
function getSet(key){ return D[key] instanceof Set ? Array.from(D[key]) : [] }
function hasVal(key,v){ return D[key] instanceof Set ? D[key].has(v) : D[key]===v }

function toggleSet(key,v){
  if(!D[key]) D[key]=new Set();
  D[key].has(v)?D[key].delete(v):D[key].add(v);
}
function setVal(key,v){ D[key]=v; }

// ── 빌더 ──
function makeTags(containerId, key, values, multi){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  wrap.className = 'sel-grid';
  values.forEach(v=>{
    const div = document.createElement('div');
    const on = hasVal(key,v);
    div.className = 'sel-item'+(on?' sel':'');
    div.innerHTML = `<div class="sel-box">${on?'✓':''}</div><div class="sel-content"><div class="sel-name">${v}</div></div>`;
    div.addEventListener('click',()=>{
      if(multi){
        toggleSet(key,v);
        const now = hasVal(key,v);
        div.classList.toggle('sel',now);
        div.querySelector('.sel-box').textContent = now?'✓':'';
      } else {
        wrap.querySelectorAll('.sel-item').forEach(x=>{x.classList.remove('sel');x.querySelector('.sel-box').textContent='';});
        setVal(key,v);
        div.classList.add('sel');
        div.querySelector('.sel-box').textContent='✓';
      }
    });
    wrap.appendChild(div);
  });
}

function makeRadios(containerId, key, values, withSub, grid){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  const hasSub = values.some(item=>typeof item==='object' && item.sub);
  wrap.className = (grid || !hasSub) ? 'sel-grid' : 'sel-wrap';
  values.forEach(item=>{
    const v = typeof item==='object'?item.v:item;
    const sub = typeof item==='object'?item.sub:'';
    const on = D[key]===v;
    const div = document.createElement('div');
    div.className = 'sel-item'+(on?' sel':'');
    div.innerHTML = `<div class="sel-box">${on?'✓':''}</div><div class="sel-content"><div class="sel-name">${v}</div>${sub?`<div class="sel-desc">${sub}</div>`:''}</div>`;
    div.addEventListener('click',()=>{
      wrap.querySelectorAll('.sel-item').forEach(x=>{x.classList.remove('sel');x.querySelector('.sel-box').textContent='';});

// ── 신체 부위 선택 ──
const SOLO_PARTS=new Set(['등','두통','흉부','복부','안면']);
const romMapping={'목':'경추','허리':'요추','등':'흉추','골반':'골반','어깨':'견관절','팔꿈치':'주관절','손목':'수관절','손':'수관절','손가락':'수관절','엉치':'천골','엉덩이':'고관절','무릎':'슬관절','발목':'족관절','발':'족관절','발가락':'족관절','안면':'경추','두통':'경추','턱관절':'턱관절','흉부':'흉추','복부':'요추'};
// {partName: {solo?:true} | {open:bool,rt:bool,lt:bool,rl:bool}}
const bodyS={};

function togPart(name){
  const cell=document.querySelector('[data-area="'+name+'"]');
  if(SOLO_PARTS.has(name)){
    if(bodyS[name]){
      delete bodyS[name];
      if(cell){const it=cell.querySelector('.pb-item');it.classList.remove('on');const ch=it.querySelector('.pb-check');if(ch)ch.textContent='';}
    } else {
      bodyS[name]={solo:true};
      if(cell){const it=cell.querySelector('.pb-item');it.classList.add('on');const ch=it.querySelector('.pb-check');if(ch)ch.textContent='✓';}
    }
  } else {
    if(bodyS[name]){
      delete bodyS[name];
      if(cell){const it=cell.querySelector('.pb-item');it.classList.remove('on');const ch=it.querySelector('.pb-check');if(ch)ch.textContent='';const tg=cell.querySelector('.pb-toggles');if(tg){tg.classList.remove('vis');tg.querySelectorAll('.pb-btn').forEach(b=>b.classList.remove('on'));}}
    } else {
      bodyS[name]={open:true,rt:false,lt:false,rl:false};
      if(cell){const it=cell.querySelector('.pb-item');it.classList.add('on');const ch=it.querySelector('.pb-check');if(ch)ch.textContent='✓';const tg=cell.querySelector('.pb-toggles');if(tg)tg.classList.add('vis');}
    }
  }
  D.subArea=buildSubArea();
  computeRomActive();
  renderBodySel();
}

function togSide(name,side){
  if(!bodyS[name]) return;
  const s=bodyS[name];
  const wasOn=s[side];
  s.rt=false; s.lt=false; s.rl=false;
  if(!wasOn) s[side]=true;
  const cell=document.querySelector('[data-area="'+name+'"]');
  if(cell){
    const tg=cell.querySelector('.pb-toggles');
    if(tg){tg.querySelector('[data-side="rt"]').classList.toggle('on',!!s.rt);tg.querySelector('[data-side="lt"]').classList.toggle('on',!!s.lt);tg.querySelector('[data-side="rl"]').classList.toggle('on',!!s.rl);}
  }
  D.subArea=buildSubArea();
  computeRomActive();
  renderBodySel();
}

function buildSubArea(){
  const arr=[];
  Object.entries(bodyS).forEach(([nm,s])=>{
    if(s.solo){arr.push(nm);}
    else{const p=[];if(s.rl)p.push('양측');else{if(s.rt)p.push('우측');if(s.lt)p.push('좌측');}if(p.length)arr.push(nm+' '+p.join(' '));}
  });
  return new Set(arr);
}

function computeRomActive(){
  const active=new Set();
  Array.from(buildSubArea()).forEach(label=>{
    const nm=label.split(' ')[0];
    if(romMapping[nm]) active.add(romMapping[nm]);
  });
  D.romActive=Array.from(active);
}

function renderBodySel(){
  const tl=document.getElementById('tlist');
  if(!tl) return;
  const arr=Array.from(buildSubArea());
  if(!arr.length){tl.innerHTML='<span class="empty-t">선택된 부위가 없습니다</span>';return;}
  tl.innerHTML='';
  arr.forEach(label=>{
    const t=document.createElement('span');t.className='tag';t.textContent=label;tl.appendChild(t);
  });
}

function resetBodyAll(){
  for(const k in bodyS) delete bodyS[k];
  D.subArea=new Set();D.romActive=[];
  document.querySelectorAll('.pb-item').forEach(b=>{b.classList.remove('on');const ch=b.querySelector('.pb-check');if(ch)ch.textContent='';});
  document.querySelectorAll('.pb-toggles').forEach(t=>{t.classList.remove('vis');t.querySelectorAll('.pb-btn').forEach(b=>b.classList.remove('on'));});
  renderBodySel();
}

// ── 스크롤 인디케이터 ──
function updateScrollIndicator(){
  const indicator=document.getElementById('scroll-indicator');
  const thumb=document.getElementById('scroll-thumb');
  const arrows=document.querySelector('.scroll-arrows');
  if(!indicator||!thumb) return;

  function update(){
    const scrollTop=window.scrollY;
    const docHeight=document.documentElement.scrollHeight;
    const winHeight=window.innerHeight;
    const scrollable=docHeight-winHeight;

    if(scrollable<=10){
      indicator.classList.remove('visible');
      return;
    }
    indicator.classList.add('visible');

    const trackHeight=140;
    const thumbHeight=Math.max(28,(winHeight/docHeight)*trackHeight);
    const thumbTop=(scrollTop/scrollable)*(trackHeight-thumbHeight);

    thumb.style.height=thumbHeight+'px';
    thumb.style.top=thumbTop+'px';

    const atBottom=scrollTop+winHeight>=docHeight-8;
    if(arrows){arrows.style.opacity=atBottom?'0':'1';arrows.style.transition='opacity 0.3s';}
  }

  window.removeEventListener('scroll',update);
  window.addEventListener('scroll',update);
  update();
}

  const subWrap=document.getElementById('ref-sub');
  if(!catWrap||!subWrap) return;
  subWrap.style.display='none';

  catWrap.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;';

  Object.keys(catDefs).forEach(cat=>{
    const on=D.refCat===cat;
    const subs=catDefs[cat];

    const item=document.createElement('div');
    item.className='pb-item'+(on?' on':'');
    item.style.cssText='cursor:pointer;';

    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;';
    const check=document.createElement('span');
    check.className='pb-check';
    check.textContent=on?'✓':'';
    const label=document.createElement('span');
    label.style.cssText='font-size:18px;font-weight:600;color:#455546;';
    label.textContent=cat;
    row.appendChild(check);
    row.appendChild(label);

    const toggles=document.createElement('div');
    toggles.className='pb-toggles'+(on?' vis':'');
    toggles.style.cssText='grid-template-columns:1fr 1fr;border-top:'+(on?'1px solid #C5D5C0':'none')+';padding-top:'+(on?'14px':'0')+';margin-top:'+(on?'14px':'0')+';transition:all 0.25s;';

    subs.forEach(sub=>{
      const bon=D.refDetail===sub;
      const btn=document.createElement('button');
      btn.className='pb-btn'+(bon?' on':'');
      btn.textContent=sub;
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        toggles.querySelectorAll('.pb-btn').forEach(b=>b.classList.remove('on'));
        D.refDetail=sub;
        btn.classList.add('on');
      });
      toggles.appendChild(btn);
    });

    item.appendChild(row);
    item.appendChild(toggles);

    row.addEventListener('click',()=>{
      if(D.refCat===cat) return;
      catWrap.querySelectorAll('.pb-item').forEach(x=>{
        x.classList.remove('on');
        const ch=x.querySelector('.pb-check');if(ch)ch.textContent='';
        const tg=x.querySelector('.pb-toggles');if(tg){
          tg.classList.remove('vis');
          tg.style.borderTop='none';
          tg.style.paddingTop='0';
          tg.style.marginTop='0';
          tg.querySelectorAll('.pb-btn').forEach(b=>b.classList.remove('on'));
        }
      });
      D.refCat=cat;
      D.refDetail='';
      item.classList.add('on');
      check.textContent='✓';
      toggles.classList.add('vis');
      toggles.style.borderTop='1px solid #C5D5C0';
      toggles.style.paddingTop='14px';
      toggles.style.marginTop='14px';
    });

    catWrap.appendChild(item);
  });
}

function s1(c){
  const sections=[
    {title:'척추', id:'spine-grid', parts:['목','허리','등','골반']},
    {title:'상지', id:'upper-grid', parts:['어깨','팔꿈치','손목','손','손가락']},
    {title:'하지', id:'lower-grid', parts:['엉치','엉덩이','무릎','발목','발','발가락']},
    {title:'기타', id:'other-grid', parts:['안면','두통','턱관절','흉부','복부','그외']},
  ];

  c.innerHTML=`
    <div class="step-header">
      <div class="step-badge">STEP 3 / ${STEPS}</div>
      <div class="step-title-row"><div class="step-title">지금 가장 많이 불편한 곳은 어디인가요?</div><div class="step-desc">불편한 부위를 선택하면 좌우 방향을 지정할 수 있습니다.</div></div>
    </div>
    ${sections.map(sec=>`
    <div class="pb-section">
      <div class="pb-section-title">${sec.title}</div>
      <div class="pb-grid" id="${sec.id}"></div>
    </div>`).join('')}
    <div class="body-sel-box">
      <p class="sel-title">선택된 부위</p>
      <div class="tags" id="tlist"><span class="empty-t">선택된 부위가 없습니다</span></div>
      <button class="reset-b" onclick="resetBodyAll()">전체 초기화</button>
    </div>`;

  function buildGrid(containerId, parts){
    const container=document.getElementById(containerId);
    parts.forEach(nm=>{
      const s=bodyS[nm]||{};
      const isSolo=SOLO_PARTS.has(nm)||nm==='그외';
      const isOn=isSolo?!!s.solo:!!(s.open||s.rt||s.lt||s.rl);
      const cell=document.createElement('div');
      cell.className='pb-cell';cell.dataset.area=nm;
      const card=document.createElement('div');
      card.className='pb-item'+(isOn?' on':'');
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;cursor:pointer;width:100%';
      row.innerHTML=`<span class="pb-check">${isOn?'✓':''}</span><span>${nm}</span>`;
      row.addEventListener('click',()=>togPart(nm));
      card.appendChild(row);
      if(!isSolo){
        const tg=document.createElement('div');
        tg.className='pb-toggles'+(isOn?' vis':'');
        ['rt','lt','rl'].forEach(side=>{
          const b=document.createElement('button');
          b.className='pb-btn'+((s[side])?' on':'');
          b.dataset.side=side;
          b.textContent=side==='rt'?'우측':side==='lt'?'좌측':'양측';
          b.addEventListener('click',e=>{e.stopPropagation();togSide(nm,side);});
          tg.appendChild(b);
        });
        card.appendChild(tg);
      }
      cell.appendChild(card);
      container.appendChild(cell);
    });
  }
  sections.forEach(sec=>buildGrid(sec.id, sec.parts));
  renderBodySel();
}

// ── Supabase 설정 ──
const SUPABASE_URL = 'https://lxxaqupljilvbtqnnyey.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Wao5CATvkJUs36XD3Lnlxg_5Hvq9TGq';

async function saveSurvey(){
  const code = Math.floor(1000 + Math.random() * 9000).toString();
  const payload = {
    code: code,
    data: JSON.stringify({
      name: D.name||'',
      age: D.age||'',
      gender: D.gender||'',
      subArea: getSet('subArea'),
      romActive: D.romActive||[],
      muscle: getSet('muscle'),
      nerve: getSet('nerve'),
      nrs: D.nrs||'',
      onset: D.onset||'',
      cause: D.cause||'',
      painWhen: getSet('painWhen'),
      persist: D.persist||'',
      duration: D.duration||'',
      freq: D.freq||null,
      worsen: getSet('worsen'),
      hospital: getSet('hospital'),
      imaging: getSet('imaging'),
      ptx: getSet('ptx'),
      conservative: getSet('conservative'),
      ktx: getSet('ktx'),
      inj: getSet('inj'),
      surg: getSet('surg'),
      txEffect: D.txEffect||'',
      txPersist: D.txPersist||'',
      pmhx: getSet('pmhx'),
      lifestyle: getSet('lifestyle'),
      exercise: D.exercise||'',
      sleepTime: D.sleepTime||'',
      sleepMaint: D.sleepMaint||'',
      alcohol: D.alcohol||'',
      smoke: D.smoke||'',
      fat1: D.fat1 !== undefined ? D.fat1 : null,
      fat2: D.fat2 !== undefined ? D.fat2 : null,
      fat3: D.fat3 !== undefined ? D.fat3 : null,
      fat4: D.fat4 !== undefined ? D.fat4 : null,
    })
  };

  let res;
  try {
    res = await fetch(`${SUPABASE_URL}/rest/v1/surveys`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });
  } catch(networkErr) {
    throw new Error('네트워크 오류: ' + networkErr.message);
  }

  if(res.ok) return { code, saved: true };

  let errDetail = '';
  try { errDetail = await res.text(); } catch(e){}
  console.error('Supabase 저장 오류', res.status, errDetail);
  // 저장 실패해도 코드는 반환 (saved:false 로 표시)
  return { code, saved: false, errMsg: `HTTP ${res.status}: ${errDetail}` };
}
